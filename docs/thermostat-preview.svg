      <line x1="34.2" y1="205.7" x2="20.4" y2="207.2"/>
      <!-- tick 9: 175.5° -->
      <line x1="34.2" y1="193.5" x2="20.4" y2="193.6"/>
      <!-- tick 10: 180° (left) -->
      <line x1="35.2" y1="181.2" x2="21.5" y2="180.0"/>
      <!-- tick 11: 184.5° -->
      <line x1="37.2" y1="169.0" x2="23.6" y2="166.5"/>
      <!-- tick 12: 189° -->
      <line x1="40.0" y1="157.0" x2="26.7" y2="153.2"/>
      <!-- tick 13: 193.5° -->
      <line x1="43.8" y1="145.2" x2="30.9" y2="140.3"/>
      <!-- tick 14: 198° -->
      <line x1="48.5" y1="133.8" x2="36.0" y2="127.8"/>
      <!-- tick 15: 202.5° -->
      <line x1="54.0" y1="122.9" x2="42.1" y2="115.9"/>
      <!-- tick 16: 207° -->
      <line x1="60.4" y1="112.5" x2="49.1" y2="104.6"/>
      <!-- tick 17: 211.5° -->
      <line x1="67.5" y1="102.7" x2="57.0" y2="94.0"/>
      <!-- tick 18: 216° -->
      <line x1="75.5" y1="93.5" x2="65.7" y2="84.2"/>
      <!-- tick 19: 220.5° -->
      <line x1="84.2" y1="85.1" x2="75.2" y2="75.2"/>
      <!-- tick 20: 225° (upper-left) -->
      <line x1="93.5" y1="77.5" x2="85.4" y2="67.0"/>
      <!-- tick 21: 229.5° -->
      <line x1="103.5" y1="70.6" x2="96.3" y2="59.7"/>
      <!-- tick 22: 234° -->
      <line x1="114.0" y1="64.5" x2="107.8" y2="53.4"/>
