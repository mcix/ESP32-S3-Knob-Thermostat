      <line x1="160.3" y1="49.1" x2="158.8" y2="37.5"/>
      <!-- tick 27: 256.5° -->
      <line x1="172.5" y1="47.5" x2="172.3" y2="36.0"/>
      <!-- tick 28: 261° -->
      <line x1="184.7" y1="46.9" x2="186.0" y2="35.4"/>
      <!-- tick 29: 265.5° -->
      <line x1="196.9" y1="47.3" x2="199.6" y2="35.9"/>
