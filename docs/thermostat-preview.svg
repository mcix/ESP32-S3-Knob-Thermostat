  <!-- Current temp: 20.5°C (tick 41), Target temp: 21.5°C (tick 43) -->

  <g stroke="#FFFFFF" stroke-linecap="round">
    <!-- Ticks 0-40 (before current, 70% opacity) -->
    <g opacity="0.7" stroke-width="2">
      <!-- tick 0: 135° (bottom-left) -->
      <line x1="66.9" y1="293.1" x2="56.3" y2="303.7"/>
      <!-- tick 1: 139.5° -->
      <line x1="59.8" y1="283.8" x2="48.6" y2="293.6"/>
