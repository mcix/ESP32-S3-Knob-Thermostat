    <!-- Current temp tick (20.5°C, tick 41) - bold -->
    <!-- tick 41: 319.5° -->
    <line x1="312.5" y1="116.7" x2="328.7" y2="112.1" stroke-width="4"/>

    <!-- Tick between current and target (100% opacity) -->
    <!-- tick 42: 324° -->
    <line x1="317.6" y1="126.8" x2="334.3" y2="123.2" stroke-width="2"/>

    <!-- Target temp tick (21.5°C, tick 43) - bold and longer (inner radius 150) -->
    <!-- tick 43: 328.5° -->
    <line x1="317.5" y1="140.0" x2="339.0" y2="134.8" stroke-width="4"/>

    <!-- Ticks 44-59 (after target, 70% opacity) -->
