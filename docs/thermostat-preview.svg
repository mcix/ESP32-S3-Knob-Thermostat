      <line x1="327.5" y1="214.4" x2="344.3" y2="219.7"/>
      <!-- tick 51: 364.5° -->
      <line x1="324.6" y1="225.2" x2="341.1" y2="231.7"/>
      <!-- tick 52: 369° -->
      <line x1="320.8" y1="235.8" x2="336.9" y2="243.4"/>
      <!-- tick 53: 373.5° -->
      <line x1="316.1" y1="246.0" x2="331.8" y2="254.7"/>
      <!-- tick 54: 378° -->
      <line x1="310.6" y1="255.7" x2="325.8" y2="265.5"/>
      <!-- tick 55: 382.5° -->
      <line x1="304.3" y1="265.0" x2="318.9" y2="275.8"/>
      <!-- tick 56: 387° -->
      <line x1="297.2" y1="273.7" x2="311.2" y2="285.4"/>
      <!-- tick 57: 391.5° -->
      <line x1="289.4" y1="281.8" x2="302.7" y2="294.3"/>
      <!-- tick 58: 396° -->
      <line x1="281.0" y1="289.2" x2="293.5" y2="302.5"/>
      <!-- tick 59: 400.5° (bottom-right) -->
      <line x1="272.0" y1="295.9" x2="283.7" y2="309.9"/>
    </g>
  </g>

  <!-- Target temperature (large, center) -->
  <text x="180" y="175" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="48" font-weight="bold">21.5°</text>

  <!-- Current temperature (smaller, below) -->
  <text x="180" y="220" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32">20.5°</text>

  <!-- Status text -->
  <text x="180" y="260" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" opacity="0.7">Temp set</text>
</svg>
