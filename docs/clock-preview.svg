<svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="180" cy="180" r="180" fill="#000000"/>

  <!-- Hour tick marks -->
  <g stroke="#FFFFFF" stroke-linecap="round">
    <!-- 12 o'clock (longer) -->
    <line x1="180" y1="30" x2="180" y2="50" stroke-width="4"/>
    <!-- 1 o'clock -->
    <line x1="255" y1="47" x2="247" y2="62" stroke-width="2"/>
    <!-- 2 o'clock -->
    <line x1="313" y1="105" x2="298" y2="113" stroke-width="2"/>
    <!-- 3 o'clock (longer) -->
    <line x1="330" y1="180" x2="310" y2="180" stroke-width="4"/>
    <!-- 4 o'clock -->
    <line x1="313" y1="255" x2="298" y2="247" stroke-width="2"/>
    <!-- 5 o'clock -->
    <line x1="255" y1="313" x2="247" y2="298" stroke-width="2"/>
    <!-- 6 o'clock (longer) -->
    <line x1="180" y1="330" x2="180" y2="310" stroke-width="4"/>
    <!-- 7 o'clock -->
    <line x1="105" y1="313" x2="113" y2="298" stroke-width="2"/>
    <!-- 8 o'clock -->
    <line x1="47" y1="255" x2="62" y2="247" stroke-width="2"/>
    <!-- 9 o'clock (longer) -->
    <line x1="30" y1="180" x2="50" y2="180" stroke-width="4"/>
    <!-- 10 o'clock -->
    <line x1="47" y1="105" x2="62" y2="113" stroke-width="2"/>
    <!-- 11 o'clock -->
    <line x1="105" y1="47" x2="113" y2="62" stroke-width="2"/>
  </g>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="180" y1="180" x2="120" y2="120" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

  <!-- Minute hand (pointing to ~10) -->
  <line x1="180" y1="180" x2="100" y2="160" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Second hand (pointing to ~30) -->
  <line x1="180" y1="180" x2="180" y2="310" stroke="#E46A2C" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="180" cy="180" r="6" fill="#FFFFFF"/>

  <!-- Digital time -->
  <text x="180" y="270" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="32" font-weight="bold">14:28</text>
</svg>
