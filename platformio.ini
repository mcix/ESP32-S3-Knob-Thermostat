; PlatformIO Configuration for ESP32-S3-Knob-Touch-LCD-1.8 Thermostat
; https://www.waveshare.com/wiki/ESP32-S3-Knob-Touch-LCD-1.8

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3 specific settings
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB

; Partition scheme for 16MB flash
board_build.partitions = default_16MB.csv

; USB CDC for serial output
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_DIR}/include
    ; Display settings
    -DDISPLAY_WIDTH=360
    -DDISPLAY_HEIGHT=360

; Force full recompile of libraries when lv_conf.h changes
lib_archive = no

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

; Library dependencies
lib_deps =
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.0.0
    moononournation/GFX Library for Arduino@^1.4.9

; Extra source directories
lib_extra_dirs =
    lib
